appId: com.kouign.app
productName: Kouign Assistant
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Predictable, version- and arch-stamped asset names the release + landing page rely on.
artifactName: ${productName}-${version}-${arch}.${ext}
mac:
  category: public.app-category.productivity
  target: dmg              # each runner builds its NATIVE arch (arm64 on macos-14, x64 on macos-13)
  icon: build/icon.icns
  hardenedRuntime: true
  identity: null           # unsigned — signing is a later phase
dmg:
  title: Kouign Assistant
win:
  target: nsis
  icon: build/icon.png     # electron-builder converts PNG -> .ico automatically
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
