appId: com.kouign.app
productName: Kouign Assistant
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Predictable, version- and arch-stamped asset names the release + landing page rely on.
artifactName: ${productName}-${version}-${arch}.${ext}
mac:
  category: public.app-category.productivity
  target: dmg              # runner builds its NATIVE arch (arm64 on macos-14)
  icon: build/icon.icns
  hardenedRuntime: true
  identity: null           # unsigned — signing is a later phase
dmg:
  title: Kouign Assistant
win:
  target: nsis
  icon: build/icon.png     # electron-builder converts PNG -> .ico automatically
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target: AppImage        # single portable executable — no install/root required
  category: Utility
  icon: build/icon.png     # electron-builder generates the icon set from this PNG
